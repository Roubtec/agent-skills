name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Same-repo guard: secrets.CLAUDE_CODE_OAUTH_TOKEN isn't available to
    # `pull_request` runs triggered from a fork, so without this the job
    # would just fail (or the action would skip) on every external PR.
    if: github.event.pull_request.head.repo.full_name == github.repository

    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      # write: posting inline review comments (mcp__github_inline_comment__
      # create_inline_comment) needs pull-requests write, not just read.
      pull-requests: write
      issues: read
      id-token: write
    concurrency:
      # A rapid string of pushes to the same PR only needs a review of the
      # latest one; cancel stale in-flight reviews rather than queuing them.
      group: claude-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      # Not currently needed: this repo has no package.json / pnpm project
      # (mirrors claude.yml — see that file's comment). Uncomment together
      # with the pnpm/npx/corepack tool allowances below if that changes.
      # - name: Setup Node.js
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: 24
      #
      # - name: Enable Corepack (provides pnpm from packageManager field)
      #   run: corepack enable

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          #
          # Same model/effort floor and tool allowlist as claude.yml — see
          # that file for the full rationale. This bot posts one inline
          # comment per finding per the repo-root CLAUDE.md's "Code Review
          # Format Guidelines", so it needs the inline-comment tool. The
          # pnpm/npx/corepack allowances are commented out along with the
          # Node/Corepack setup steps above — uncomment both together if
          # this repo grows a pnpm project.
          claude_args: '--model claude-opus-4-8 --effort xhigh --allowed-tools "Bash(gh pr:*),mcp__github_inline_comment__create_inline_comment"'
          # claude_args: '--model claude-opus-4-8 --effort xhigh --allowed-tools "Bash(gh pr:*),Bash(pnpm:*),Bash(npx:*),Bash(corepack:*),mcp__github_inline_comment__create_inline_comment"'

