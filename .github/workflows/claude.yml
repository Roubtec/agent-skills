name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    # No `assigned`: the gate below only checks the issue title/body for
    # @claude, so on a matching issue every later (unrelated) assignment
    # change would re-fire this write-permission job. Summon the bot on an
    # existing issue with an @claude comment instead.
    types: [opened]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Author-association gate: this job runs with write permissions and
    # access to secrets.CLAUDE_CODE_OAUTH_TOKEN, so an @claude mention alone
    # isn't enough of a trigger — anyone able to comment could otherwise
    # summon it. Restrict to trusted associations (owner/member/collaborator).
    if: |
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    concurrency:
      group: claude-${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
      # cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # Full history, mirroring claude-code-review.yml: @claude tasks
          # (reviews, fixes) can use git blame/log, which stop at a
          # shallow-clone boundary. This repo is small, so it stays cheap.
          fetch-depth: 0

      # Tag mode checks out an open PR's head branch before starting Claude.
      # Preserve the trigger-time copy outside the checkout so reviews still
      # work for branches that predate this contract file.
      - name: Stage review-format contract
        run: cp .github/claude/review-format.md "$RUNNER_TEMP/review-format.md"

      # Not currently needed: this repo has no package.json / pnpm project
      # (these steps were inherited from a monorepo template). Uncomment if
      # that changes — see claude_args below for the matching pnpm/npx/
      # corepack tool allowances, also commented out.
      # - name: Setup Node.js
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: 24
      #
      # - name: Enable Corepack (provides pnpm from packageManager field)
      #   run: corepack enable

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Mirrors the job-level `actions: read` permission above — the
          # action only uses that permission to read CI results if it's
          # also declared here.
          additional_permissions: |
            actions: read

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          # Allowed tools the agent may invoke without prompting:
          #   - gh pr:*        — read/comment on the PR it was summoned from
          #   - pnpm:*, npx:*, corepack:* — commented out below along with the
          #                      Node/Corepack setup steps above; this repo has
          #                      no pnpm project right now. Uncomment both
          #                      together if that changes.
          #   - mcp__github_inline_comment__create_inline_comment — post each
          #                      review finding as its own line-anchored,
          #                      independently resolvable thread instead of
          #                      folding everything into one comment (see
          #                      .github/claude/review-format.md)
          # Git operations (staging, committing the fixup, pushing back to the
          # PR branch) are handled by claude-code-action itself, so we don't
          # need to list Bash(git:*) here.
          #
          # Model + reasoning effort:
          #   --model claude-opus-4-8 — pin the Opus tier by full snapshot id
          #                      (not a floating alias) so review/fix quality
          #                      doesn't silently shift when the action's default
          #                      model moves.
          #   --effort xhigh   — Opus 4.8 defaults to "high"; bump to "xhigh", the
          #                      top coding/agentic tier, since this bot reviews
          #                      and fixes real PRs. Only fires on a manual @claude
          #                      mention, so the added cost is bounded. Valid
          #                      levels: low|medium|high|xhigh|max.
          # Review requests append the staged shared contract. Matching
          # "review" also covers natural requests such as "please review";
          # the job-level gate already requires an @claude mention. Keeping
          # this in claude_args instead of adding a prompt input preserves tag
          # mode, including mention detection and the tracking comment.
          claude_args: >-
            --model claude-opus-4-8
            --effort xhigh
            --allowed-tools "Bash(gh pr:*),mcp__github_inline_comment__create_inline_comment"
            ${{
              (
                (
                  github.event_name == 'issue_comment' &&
                  github.event.issue.pull_request &&
                  contains(github.event.comment.body, 'review')
                ) ||
                (
                  github.event_name == 'pull_request_review_comment' &&
                  contains(github.event.comment.body, 'review')
                ) ||
                (
                  github.event_name == 'pull_request_review' &&
                  contains(github.event.review.body, 'review')
                )
              ) &&
              format('--append-system-prompt-file {0}/review-format.md', runner.temp) ||
              ''
            }}
          # If this repo gains a pnpm project, add Bash(pnpm:*), Bash(npx:*),
          # and Bash(corepack:*) to the allowed-tools value above when enabling
          # the matching setup steps.
